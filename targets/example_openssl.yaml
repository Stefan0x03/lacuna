name: openssl
version: "3.2.0"
source:
  type: git
  url: https://github.com/openssl/openssl.git
  ref: openssl-3.2.0
language: c
description: >
  OpenSSL cryptography and TLS toolkit. Critical library underpinning
  TLS/SSL across servers, browsers, and embedded devices.
attack_surface_hint: >
  Focus on ASN.1 / DER parsing (crypto/asn1/), X.509 certificate
  verification, BN arithmetic edge cases, PKCS#7/CMS, and protocol
  state machine transitions in ssl/statem/. Historical vuln patterns
  include buffer overflows in BIO, integer overflows in BN_*, and
  use-after-free in SSL session handling.
build_hint: >
  Step 1 (configure, ~5s): ./Configure --debug no-shared linux-x86_64
  Step 2 (build, ~5 min): make -j$(nproc)
  Run each step as a separate bash call. The build takes several minutes —
  use --timeout-per-tool 600 when invoking lacuna scan.
