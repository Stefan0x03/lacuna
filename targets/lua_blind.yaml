name: lua
version: "5.4.4"
language: c
source:
  type: git
  url: https://github.com/lua/lua.git
  ref: v5.4.4
description: >
  Lua 5.4.4 — lightweight embeddable scripting language. The C core
  is ~30 files. The primary attack surface is the execution of
  untrusted Lua source code through the public C API (lua_load,
  lua_pcall, luaL_loadbuffer).
attack_surface_hint: >
  The interpreter processes attacker-controlled Lua source and
  bytecode. Focus on these areas:

  lparser.c / llex.c — Lua source parser and lexer. Look at how
  deeply nested structures are handled: nested function definitions,
  tables, closures, and expressions. Track how the parser tracks
  nesting depth and allocates state for each level.

  ldo.c — protected calls and C stack management. Lua manages its
  own call stack on top of the C stack; look at how stack growth
  is bounded and how errors unwind. The functions luaD_call,
  luaD_pcall, and the coroutine switching path are key.

  lvm.c — the virtual machine instruction loop. Look at how the VM
  handles integer overflow in arithmetic opcodes (OP_ADD, OP_MUL,
  OP_SHL, OP_SHR) and how it bounds-checks stack access via the
  register window.

  lmem.c — the memory allocator wrapper. luaM_realloc and
  luaM_growvector are called throughout with size arguments derived
  from parser/VM state; look for integer arithmetic before these
  calls.

  lstring.c — string interning. Look at how very long strings and
  string concatenation interact with the allocator.

  The simplest harness: create a Lua state, load and run a crafted
  Lua source string, then close the state. Feed it through the
  address sanitizer binary with increasingly complex inputs.
build_hint: >
  The Lua source is in the top-level directory (no subdirectory).
  Build with sanitizers using the posix target:
    cd /workspace/lua && make MYCFLAGS="-fsanitize=address,undefined -g -O1" \
                              MYLDFLAGS="-fsanitize=address,undefined" \
                              posix
  This produces the lua and luac binaries. Test with:
    echo 'print("hello")' | ./lua -
  For a fuzzing harness, compile a small C program that calls
  luaL_newstate(), luaL_loadbuffer(), lua_pcall(), lua_close()
  on attacker-controlled input. Link against the object files:
    gcc -fsanitize=address,undefined -g -O1 harness.c *.o -lm -o harness
  Feed crafted Lua source via stdin or a file argument.
