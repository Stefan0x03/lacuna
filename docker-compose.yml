version: "3.9"
services:
  sandbox:
    build:
      context: docker/sandbox
      dockerfile: Dockerfile
    image: lacuna-sandbox
    container_name: lacuna-sandbox
    network_mode: "none"
    volumes:
      - ./workspace:/workspace:rw
    cap_drop:
      - ALL
    cap_add:
      - SYS_PTRACE
    security_opt:
      - no-new-privileges:true
    restart: "no"
